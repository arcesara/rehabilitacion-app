{% extends 'base.html' %}
{% block title %}Crear cuenta — RehabPlat{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p class="auth-subtitle">Plataforma de rehabilitación plantar</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" name="nombre" required placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
      </div>
      <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
    <p class="auth-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
  </div>
</div>
{% endblock %}
