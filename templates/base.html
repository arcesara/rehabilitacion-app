<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RehabPlat{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  {% if session.usuario_id %}
  <nav>
    <div class="nav-brand">RehabPlat</div>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}class="active"{% endif %}>Inicio</a>
      <a href="{{ url_for('ejercicio') }}" {% if request.endpoint == 'ejercicio' %}class="active"{% endif %}>Ejercicio</a>
      <a href="{{ url_for('historial') }}" {% if request.endpoint == 'historial' %}class="active"{% endif %}>Historial</a>
      <a href="{{ url_for('logout') }}" class="btn-logout">Salir</a>
    </div>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
